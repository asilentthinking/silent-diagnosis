<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>静かな自己診断 — 今の自分はどこにいる？</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1714;
    --paper: #f5f0e8;
    --mist: #c9bfb0;
    --dawn: #e8ddd0;
    --moss: #6b7c5e;
    --dusk: #7a6e8a;
    --rust: #9c6b4e;
    --cream: #faf6ef;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  /* Watercolor circles in bg */
  .bg-circle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  .bg-circle-1 {
    width: 500px; height: 500px;
    top: -150px; right: -100px;
    background: radial-gradient(circle, rgba(122,110,138,0.08) 0%, transparent 70%);
  }
  .bg-circle-2 {
    width: 400px; height: 400px;
    bottom: -100px; left: -80px;
    background: radial-gradient(circle, rgba(107,124,94,0.07) 0%, transparent 70%);
  }
  .bg-circle-3 {
    width: 300px; height: 300px;
    top: 40%; left: 30%;
    background: radial-gradient(circle, rgba(156,107,78,0.05) 0%, transparent 70%);
  }

  /* Screens */
  .screen {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .screen.active {
    display: flex;
    opacity: 1;
  }
  .screen.fade-in { animation: fadeIn 1s ease forwards; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── TOP SCREEN ─── */
  #screen-top {
    text-align: center;
    gap: 0;
  }
  .top-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--mist);
    text-transform: uppercase;
    margin-bottom: 32px;
    animation: fadeIn 1.2s ease 0.2s both;
  }
  .top-title {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 600;
    line-height: 1.4;
    letter-spacing: 0.05em;
    color: var(--ink);
    margin-bottom: 24px;
    animation: fadeIn 1.2s ease 0.4s both;
  }
  .top-subtitle {
    font-size: 13px;
    color: var(--mist);
    letter-spacing: 0.12em;
    line-height: 2;
    margin-bottom: 56px;
    animation: fadeIn 1.2s ease 0.6s both;
  }
  .btn-start {
    display: inline-block;
    padding: 14px 48px;
    border: 1px solid var(--ink);
    background: transparent;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    letter-spacing: 0.25em;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
    animation: fadeIn 1.2s ease 0.8s both;
  }
  .btn-start::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--ink);
    transform: translateX(-100%);
    transition: transform 0.4s ease;
    z-index: -1;
  }
  .btn-start:hover { color: var(--cream); }
  .btn-start:hover::before { transform: translateX(0); }

  .top-decoration {
    margin: 48px 0 32px;
    animation: fadeIn 1.2s ease 1s both;
  }
  .top-decoration svg { opacity: 0.3; }

  /* ─── QUESTION SCREEN ─── */
  #screen-question { gap: 0; }

  .progress-bar-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--dawn);
    z-index: 10;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--ink);
    transition: width 0.6s ease;
  }

  .q-counter {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--mist);
    margin-bottom: 40px;
    text-align: center;
  }
  .q-text {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(18px, 4vw, 28px);
    font-weight: 400;
    line-height: 1.8;
    letter-spacing: 0.06em;
    text-align: center;
    color: var(--ink);
    margin-bottom: 16px;
    max-width: 600px;
  }
  .q-hint {
    font-size: 11px;
    color: var(--mist);
    letter-spacing: 0.1em;
    text-align: center;
    margin-bottom: 52px;
  }

  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    max-width: 640px;
    width: 100%;
  }
  @media (max-width: 500px) {
    .choices { grid-template-columns: 1fr; }
  }

  .choice-btn {
    padding: 20px 24px;
    background: var(--cream);
    border: 1px solid var(--dawn);
    cursor: pointer;
    text-align: left;
    transition: all 0.35s ease;
    position: relative;
    overflow: hidden;
  }
  .choice-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--ink);
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .choice-btn:hover { border-color: var(--ink); }
  .choice-btn:hover::after { opacity: 0.04; }
  .choice-btn.selected {
    background: var(--ink);
    border-color: var(--ink);
  }
  .choice-btn.selected .choice-scene,
  .choice-btn.selected .choice-label { color: var(--cream); }

  .choice-scene-art {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.13;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .choice-btn:hover .choice-scene-art { opacity: 0.18; }
  .choice-btn.selected .choice-scene-art { opacity: 0.22; filter: invert(1); }

  .choice-scene {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 6px;
    display: block;
    line-height: 1.4;
  }
  .choice-label {
    font-size: 11px;
    color: var(--mist);
    letter-spacing: 0.08em;
    display: block;
    line-height: 1.6;
  }

  /* ─── LOADING ─── */
  #screen-loading {
    text-align: center;
    gap: 24px;
  }
  .loading-text {
    font-family: 'Shippori Mincho', serif;
    font-size: 16px;
    letter-spacing: 0.15em;
    color: var(--mist);
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  .loading-dots {
    display: flex; gap: 8px; justify-content: center;
  }
  .dot {
    width: 6px; height: 6px;
    background: var(--mist);
    border-radius: 50%;
    animation: dotPulse 1.4s ease infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%, 60%, 100% { transform: scale(1); opacity: 0.3; }
    30% { transform: scale(1.4); opacity: 1; }
  }

  /* ─── RESULT SCREEN ─── */
  #screen-result { gap: 0; }

  .result-eyebrow {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--mist);
    text-transform: uppercase;
    margin-bottom: 20px;
    text-align: center;
  }
  .result-phase {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(26px, 5vw, 44px);
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--ink);
    text-align: center;
    margin-bottom: 8px;
  }
  .result-phase-en {
    font-size: 11px;
    color: var(--mist);
    letter-spacing: 0.25em;
    text-align: center;
    margin-bottom: 48px;
  }

  .result-divider {
    width: 40px;
    height: 1px;
    background: var(--mist);
    margin: 0 auto 48px;
  }

  .result-message {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(15px, 2.5vw, 19px);
    font-weight: 400;
    line-height: 2.2;
    letter-spacing: 0.06em;
    color: var(--ink);
    text-align: center;
    max-width: 560px;
    margin-bottom: 48px;
    white-space: pre-wrap;
  }

  .result-note-quote {
    border-left: 2px solid var(--mist);
    padding: 16px 24px;
    max-width: 480px;
    width: 100%;
    margin-bottom: 56px;
    background: rgba(255,255,255,0.5);
  }
  .result-note-quote p {
    font-size: 13px;
    color: var(--ink);
    line-height: 2;
    letter-spacing: 0.06em;
    opacity: 0.8;
    white-space: pre-wrap;
  }
  .result-note-quote cite {
    display: block;
    font-size: 10px;
    color: var(--mist);
    letter-spacing: 0.15em;
    margin-top: 12px;
  }

  .result-note-link {
    display: inline-block;
    margin-bottom: 40px;
    padding: 13px 36px;
    border: 1px solid var(--ink);
    background: transparent;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }
  .result-note-link::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--ink);
    transform: translateX(-100%);
    transition: transform 0.4s ease;
    z-index: -1;
  }
  .result-note-link:hover { color: var(--cream); }
  .result-note-link:hover::before { transform: translateX(0); }

  .btn-retry {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--mist);
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 0;
    border-bottom: 1px solid transparent;
    transition: all 0.3s;
    margin-top: 8px;
  }
  .btn-retry:hover {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }

  /* ─── DOMAIN QUESTION SCREEN ─── */
  #screen-domain { gap: 0; text-align: center; }
  .domain-title {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(18px, 4vw, 26px);
    font-weight: 400;
    line-height: 1.8;
    letter-spacing: 0.06em;
    color: var(--ink);
    margin-bottom: 12px;
    max-width: 500px;
  }
  .domain-hint {
    font-size: 11px;
    color: var(--mist);
    letter-spacing: 0.1em;
    margin-bottom: 48px;
  }
  .domain-choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    max-width: 520px;
    width: 100%;
  }
  @media (max-width: 500px) {
    .domain-choices { grid-template-columns: 1fr; }
  }
  .domain-btn {
    padding: 18px 20px;
    background: var(--cream);
    border: 1px solid var(--dawn);
    cursor: pointer;
    font-family: 'Shippori Mincho', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.08em;
    transition: all 0.35s ease;
  }
  .domain-btn:hover {
    background: var(--ink);
    color: var(--cream);
    border-color: var(--ink);
  }

  /* Transition helper */
  .fade-out {
    animation: fadeOut 0.5s ease forwards;
  }
  @keyframes fadeOut {
    to { opacity: 0; transform: translateY(-10px); }
  }
</style>
</head>
<body>

<div class="bg-circle bg-circle-1"></div>
<div class="bg-circle bg-circle-2"></div>
<div class="bg-circle bg-circle-3"></div>

<!-- TOP -->
<div class="screen active fade-in" id="screen-top">
  <p class="top-label">A Silent Thinking — Self Diagnosis</p>
  <h1 class="top-title">今の自分は<br>どこにいる？</h1>
  <p class="top-subtitle">情景を選んで、今のあなたに届く言葉を受け取る<br>静かな5分間の自己診断</p>
  <div class="top-decoration">
    <svg width="80" height="40" viewBox="0 0 80 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 20 Q20 5 40 20 Q60 35 80 20" stroke="#1a1714" stroke-width="0.8" fill="none"/>
      <path d="M0 20 Q20 35 40 20 Q60 5 80 20" stroke="#1a1714" stroke-width="0.4" fill="none" opacity="0.4"/>
      <circle cx="40" cy="20" r="2" fill="#1a1714" opacity="0.4"/>
    </svg>
  </div>
  <button class="btn-start" onclick="startDiagnosis()">はじめる</button>
</div>

<!-- QUESTION -->
<div class="screen" id="screen-question">
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>
  <p class="q-counter" id="q-counter">Q1 / 5</p>
  <p class="q-text" id="q-text"></p>
  <p class="q-hint">今の感覚に近いものを選んでください</p>
  <div class="choices" id="choices"></div>
</div>

<!-- DOMAIN -->
<div class="screen" id="screen-domain">
  <p class="domain-title">今、一番しんどいのは<br>どのあたりですか？</p>
  <p class="domain-hint">近いものをひとつ選んでください</p>
  <div class="domain-choices">
    <button class="domain-btn" onclick="selectDomain('work')">仕事・働き方</button>
    <button class="domain-btn" onclick="selectDomain('relationship')">人間関係</button>
    <button class="domain-btn" onclick="selectDomain('self')">自分自身</button>
    <button class="domain-btn" onclick="selectDomain('love')">恋愛・パートナー</button>
  </div>
</div>

<!-- LOADING -->
<div class="screen" id="screen-loading">
  <p class="loading-text">あなたの言葉を探しています</p>
  <div class="loading-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <p class="result-eyebrow">あなたは今</p>
  <h2 class="result-phase" id="result-phase"></h2>
  <p class="result-phase-en" id="result-phase-en"></p>
  <div class="result-divider"></div>
  <p class="result-message" id="result-message"></p>
  <div class="result-note-quote">
    <p id="result-quote"></p>
    <cite id="result-cite">— あや｜INFJ内向型の生き方研究所</cite>
  </div>
  <a id="result-note-link" class="result-note-link" href="#" target="_blank" rel="noopener">このnoteを読んでみる →</a>
  <button class="btn-retry" onclick="retry()">もう一度やってみる</button>
</div>

// ── State ──────────────────────────────────────────────────────────
let currentQ = 0;
let answers = [];
let detectedPhase = "fog"; // determined from Q1 answer
let selectedDomain = "self";

// ── Navigation ─────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active', 'fade-in');
    s.style.display = 'none';
  });
  const el = document.getElementById(id);
  el.style.display = 'flex';
  requestAnimationFrame(() => {
    el.classList.add('active', 'fade-in');
  });
}

function startDiagnosis() {
  currentQ = 0;
  answers = [];
  detectedPhase = "fog";
  selectedDomain = "self";
  showScreen('screen-question');
  renderQuestion();
}

function retry() {
  startDiagnosis();
}

// ── Domain selection → triggers loading & AI ──────────────────────
function selectDomain(domain) {
  selectedDomain = domain;
  showScreen('screen-loading');
  generateResult();
}

// ── Question Rendering ─────────────────────────────────────────────
function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-counter').textContent = `Q${currentQ + 1} / ${questions.length}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-bar').style.width = `${(currentQ / questions.length) * 100}%`;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-scene">${c.scene}</span><span class="choice-label">${c.label}</span><span class="choice-scene-art">${SCENE_SVG[c.scene] || ''}</span>`;
    btn.onclick = () => selectAnswer(i, btn, c);
    choicesEl.appendChild(btn);
  });
}

function selectAnswer(index, btnEl, choice) {
  // Detect phase from Q1
  if (currentQ === 0 && choice.phase) {
    detectedPhase = choice.phase;
  }

  document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');
  answers.push(index);

  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) {
      const el = document.getElementById('screen-question');
      el.classList.add('fade-out');
      setTimeout(() => {
        el.classList.remove('fade-out');
        renderQuestion();
        el.classList.add('fade-in');
        setTimeout(() => el.classList.remove('fade-in'), 800);
      }, 450);
    } else {
      // Show domain question screen after all 5 questions
      showScreen('screen-domain');
    }
  }, 400);
}

// ── Result Generation ───────────────────────────────────────────────
async function generateResult() {
  const summary = answers.map((ai, qi) => {
    return `Q${qi+1}: ${questions[qi].choices[ai].scene}（${questions[qi].choices[ai].label}）`;
  }).join('\n');

  const domainLabel = { work: "仕事・働き方", relationship: "人間関係", self: "自分自身", love: "恋愛・パートナー" }[selectedDomain];

  const prompt = `あなたはINFJ・内向型の人の気持ちに深く寄り添う、静かで詩的なカウンセラーです。

以下は、ユーザーが選んだ5つの情景です：
${summary}

また、ユーザーが「今一番しんどい領域」として選んだのは「${domainLabel}」です。

これらを踏まえ、以下の形式でJSONを返してください。

{
  "phase": "（フェーズの名前。詩的で印象的な2〜6文字）",
  "phase_en": "（英語のサブタイトル。例：Quiet Transition）",
  "message": "（そのフェーズにいるユーザーへのメッセージ。改行を含む3〜5文の温かく詩的な文章。「${domainLabel}」の文脈を自然に含む）",
  "note_quote": "（あやさんのnoteの文体・世界観に合わせた、内向型の人に届く言葉。2〜3文。実際の引用ではなくオリジナル）"
}

JSONのみ返してください。前後に説明や\`\`\`は不要です。`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await res.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);
    showResult(result);
  } catch (e) {
    showResult({
      phase: "霧の中の灯り",
      phase_en: "Light Within the Fog",
      message: "今、あなたは霧の中にいる。\nでもその霧は、あなたを守るためのものかもしれない。\nすべてが見えなくてもいい。\n一歩だけ、前に。",
      note_quote: "静かであることは、弱さじゃない。\n内側でちゃんと、深く考えている証拠。",
    });
  }
}

function showResult(result) {
  document.getElementById('result-phase').textContent = result.phase;
  document.getElementById('result-phase-en').textContent = result.phase_en;
  document.getElementById('result-message').textContent = result.message;
  document.getElementById('result-quote').textContent = result.note_quote;

  // Set note link based on phase × domain
  const noteData = (NOTE_MAP[detectedPhase] || NOTE_MAP.fog)[selectedDomain] || NOTE_MAP.fog.self;
  const linkEl = document.getElementById('result-note-link');
  linkEl.href = noteData.url;
  linkEl.textContent = `「${noteData.title}」を読む →`;

  showScreen('screen-result');
}
</script>
